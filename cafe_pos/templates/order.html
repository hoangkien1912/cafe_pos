<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt món - {{ table.table_name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-slate-50">

    <nav class="bg-white border-b border-slate-200 shrink-0 z-10 shadow-sm">
        <div class="max-w-full mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-4">
                <a href="/tables" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 hover:bg-emerald-100 hover:text-emerald-700 transition-colors">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="flex items-center gap-3">
                    <div class="bg-emerald-600 w-10 h-10 flex items-center justify-center rounded-xl text-white shadow-md">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <div>
                        <span class="text-xl font-bold text-slate-800 leading-tight">Bàn: {{ table.table_name }}</span>
                        <p class="text-xs text-slate-500 font-medium">Đang phục vụ</p>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="w-20 md:w-56 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-slate-100 hidden md:block">
                <h2 class="font-bold text-slate-800 text-sm uppercase tracking-wider text-center md:text-left">Danh mục</h2>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-1">
                <button onclick="filterCategory('all')" id="cat-all" class="cat-btn w-full p-3 rounded-xl bg-emerald-100 text-emerald-700 font-bold transition-all flex flex-col md:flex-row items-center gap-2">
                    <i class="fas fa-border-all"></i>
                    <span class="text-[10px] md:text-sm">Tất cả</span>
                </button>

                {% for c in categories %}
                <button onclick="filterCategory('{{ c.id }}')" id="cat-{{ c.id }}" class="cat-btn w-full p-3 rounded-xl text-slate-600 hover:bg-slate-50 transition-all flex flex-col md:flex-row items-center gap-2">
                    <i class="fas fa-tag"></i>
                    <span class="text-[10px] md:text-sm truncate w-full text-center md:text-left">{{ c.name }}</span>
                </button>
                {% endfor %}
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 lg:p-6 bg-slate-50">
            <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="productGrid">
                {% for p in products %}
                <div onclick="addToCart({{ p.id }}, '{{ p.name }}', {{ p.price }})" 
                     data-category="{{ p.category_id }}" 
                     class="product-card flex flex-col bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm hover:border-emerald-500 cursor-pointer group">
                    
                    <div class="h-32 sm:h-40 bg-slate-100 relative overflow-hidden flex items-center justify-center">
                        
                        {% if p.image_url %}
                            <img src="{{ p.image_url }}" alt="{{ p.name }}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                        {% else %}
                            <i class="fas fa-coffee text-4xl text-slate-300"></i>
                        {% endif %}

                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 z-10 translate-y-2 group-hover:translate-y-0 pointer-events-none">
                            <div class="bg-emerald-500/95 text-white font-bold py-2 px-5 text-sm rounded-full shadow-lg flex items-center gap-2 pointer-events-auto">
                                <i class="fas fa-plus"></i> Thêm món
                            </div>
                        </div>
                    </div>
                    
                    <div class="p-3">
                        <h3 class="font-bold text-slate-800 text-sm line-clamp-2 h-10">{{ p.name }}</h3>
                        <p class="text-emerald-600 font-black mt-2">{{ "{:,.0f}".format(p.price) }}đ</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="w-80 lg:w-96 bg-white border-l border-slate-200 flex flex-col shrink-0 shadow-2xl">
            <div class="p-4 border-b bg-slate-50 flex justify-between items-center">
                <h2 class="font-bold text-slate-800">Đơn hàng</h2>
                <span id="cartCount" class="bg-emerald-600 text-white text-[10px] px-2 py-0.5 rounded-full">0</span>
            </div>
            
            <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="flex flex-col items-center justify-center h-full text-slate-400 opacity-50">
                    <i class="fas fa-shopping-basket text-4xl mb-2"></i>
                    <p class="text-xs">Chưa chọn món</p>
                </div>
            </div>

            <div class="p-4 border-t shadow-inner">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-500 font-medium">Tổng tiền:</span>
                    <span id="totalPrice" class="text-2xl font-black text-emerald-600">0đ</span>
                </div>
                <button id="btnCheckout" onclick="checkout()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 disabled:bg-slate-300 disabled:cursor-not-allowed">
                    <i class="fas fa-check-circle"></i>
                    THANH TOÁN
                </button>
            </div>
        </div>
    </main>

    <script>
        let cart = {};
        const tableId = "{{ table.id }}";

        function filterCategory(catId) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.remove('bg-emerald-100', 'text-emerald-700', 'font-bold');
                btn.classList.add('text-slate-600');
            });
            const activeBtn = document.getElementById('cat-' + catId);
            if(activeBtn) activeBtn.classList.add('bg-emerald-100', 'text-emerald-700', 'font-bold');

            document.querySelectorAll('.product-card').forEach(card => {
                const productCat = card.getAttribute('data-category');
                card.style.display = (catId === 'all' || productCat === String(catId)) ? 'flex' : 'none';
            });
        }

        function addToCart(id, name, price) {
            if (cart[id]) cart[id].quantity += 1;
            else cart[id] = { name, price, quantity: 1 };
            renderCart();
        }

        function updateQuantity(id, delta) {
            if (cart[id]) {
                cart[id].quantity += delta;
                if (cart[id].quantity <= 0) delete cart[id];
                renderCart();
            }
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            const totalEl = document.getElementById('totalPrice');
            const countEl = document.getElementById('cartCount');
            let total = 0, totalItems = 0;
            
            if (Object.keys(cart).length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400 opacity-50"><i class="fas fa-shopping-basket text-4xl mb-2"></i><p class="text-xs">Chưa chọn món</p></div>`;
                totalEl.innerText = '0đ';
                countEl.innerText = '0';
                return;
            }

            container.innerHTML = '';
            Object.entries(cart).forEach(([id, item]) => {
                total += item.price * item.quantity;
                totalItems += item.quantity;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100 mb-2">
                        <div class="flex-1 pr-2">
                            <h4 class="font-bold text-xs text-slate-800">${item.name}</h4>
                            <p class="text-emerald-600 font-bold text-sm mt-1">${(item.price * item.quantity).toLocaleString('vi-VN')}đ</p>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            <button onclick="updateQuantity(${id}, -1)" class="w-8 h-8 rounded bg-white border text-slate-500 hover:bg-slate-100 text-lg font-bold">-</button>
                            <span class="font-bold text-lg w-6 text-center">${item.quantity}</span>
                            <button onclick="updateQuantity(${id}, 1)" class="w-8 h-8 rounded bg-white border text-slate-500 hover:bg-slate-100 text-lg font-bold">+</button>
                        </div>
                    </div>`;
            });
            totalEl.innerText = total.toLocaleString('vi-VN') + 'đ';
            countEl.innerText = totalItems;
        }

        async function checkout() {
            const items = Object.keys(cart).map(id => ({ product_id: parseInt(id), quantity: cart[id].quantity }));
            if (items.length === 0) return alert('Vui lòng chọn món!');

            const btn = document.getElementById('btnCheckout');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ĐANG XỬ LÝ...';

            try {
                const response = await fetch('/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table_id: parseInt(tableId), items: items })
                });
                
                const data = await response.json();
                
                if (data.order_id) {
                    alert(`Thanh toán thành công! Khách hàng được cộng thêm ${data.points_added} điểm.`);
                    // CHÚ Ý: Chuyển hướng trực tiếp tới Route invoice
                    window.location.href = `/invoice/${data.order_id}`;
                } else {
                    alert('Lỗi: ' + (data.error || 'Không xác định'));
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check-circle"></i> THANH TOÁN';
                }
            } catch (err) {
                alert('Lỗi kết nối Server!');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle"></i> THANH TOÁN';
            }
        }
    </script>
</body>
</html>
