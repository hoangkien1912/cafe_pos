<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Báo Cáo Doanh Thu</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f5f6fa;
        }
        .card {
            border-radius: 12px;
        }
        .table th {
            background: #3498db;
            color: white;
        }
        .revenue-box {
            font-size: 26px;
            font-weight: bold;
            color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <!-- Tiêu đề -->
    <h2 class="text-center mb-4">📊 Báo Cáo Doanh Thu</h2>

    <!-- Thông tin tổng quan -->
    <div class="card shadow-sm p-4 mb-4">
        <h5><b>Tổng doanh thu:</b></h5>
        <div class="revenue-box">
            {{ revenue | float | round(0) | int }} VNĐ
        </div>

        <p class="text-muted mt-2">
            Cập nhật lúc: {{ now.strftime("%d/%m/%Y %H:%M:%S") }}
        </p>
    </div>

    <!-- Biểu đồ doanh thu -->
    <div class="card shadow-sm p-4 mb-4">
        <h5 class="mb-3"><b>Biểu đồ doanh thu theo ngày</b></h5>
        <canvas id="revenueChart"></canvas>
    </div>

    <!-- Bảng doanh thu -->
    <div class="card shadow-sm p-4">
        <h5 class="mb-3"><b>Chi tiết doanh thu từng ngày</b></h5>
        <table class="table table-bordered text-center">
            <thead>
                <tr>
                    <th>Ngày</th>
                    <th>Doanh Thu (VNĐ)</th>
                </tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row.date }}</td>
                    <td>{{ row.revenue | int }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>

<!-- Script vẽ biểu đồ -->
<script>
    const labels = [
        {% for row in data %}
            "{{ row.date }}",
        {% endfor %}
    ];

    const revenues = [
        {% for row in data %}
            {{ row.revenue }},
        {% endfor %}
    ];

    const ctx = document.getElementById('revenueChart').getContext('2d');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Doanh thu VNĐ',
                data: revenues,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: false
                }
            }
        }
    });
</script>

</body>
</html>
